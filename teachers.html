<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Мұғалімдер</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="1234.jpg"></head>
<body>
<header>
    <h1 id="title"></h1>
    <p id="subtitle"></p>
</header>

<nav>
    <a href="index.html" id="nav-main"></a>
    <a href="about.html" id="nav-about"></a>
    <a href="schedule.html" id="nav-schedule"></a>
    <a href="teachers.html" id="nav-teachers"></a>
    <a href="news.html" id="nav-news"></a>
    <a href="contacts.html" id="nav-contacts"></a>

    <select id="langSelect">
        <option value="kk">Қазақша</option>
        <option value="ru">Русский</option>
        <option value="en">English</option>
    </select>
</nav>

<button id="theme-toggle" title="Түнгі/күндізгі режим">🌙</button>

<main>
    <section>
        <h2 id="teachers-title"></h2>
        <ul id="teachers-list"></ul>
    </section>
</main>

<footer>
    <p id="footer-text"></p>
</footer>

<script src="script.js"></script>
<script>
const dataExtra = {
    kk: {
        "teachers-title": "Мұғалімдер",
        "teachers-list": "<li>Айтбаев А.</li><li>Бекжанова Г.</li><li>Сұлтанов М.</li>"
    },
    ru: {
        "teachers-title": "Учителя",
        "teachers-list": "<li>Айтбаев А.</li><li>Бекжанова Г.</li><li>Султанов М.</li>"
    },
    en: {
        "teachers-title": "Teachers",
        "teachers-list": "<li>Aitbaev A.</li><li>Bekzhanova G.</li><li>Sultanov M.</li>"
    }
};

function updateExtra() {
    const lang = document.getElementById("langSelect").value;
    const t = dataExtra[lang];
    for (let key in t) {
        const el = document.getElementById(key);
        if (el) el.innerHTML = t[key];
    }
}

document.getElementById("langSelect").addEventListener("change", updateExtra);
updateExtra();
</script>
</body>
</html>
