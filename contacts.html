<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Байланыс</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="1234.jpg"></head>
<body>
<header>
    <h1 id="title"></h1>
    <p id="subtitle"></p>
</header>

<nav>
    <a href="index.html" id="nav-main"></a>
    <a href="about.html" id="nav-about"></a>
    <a href="schedule.html" id="nav-schedule"></a>
    <a href="teachers.html" id="nav-teachers"></a>
    <a href="news.html" id="nav-news"></a>
    <a href="contacts.html" id="nav-contacts"></a>

    <select id="langSelect">
        <option value="kk">Қазақша</option>
        <option value="ru">Русский</option>
        <option value="en">English</option>
    </select>
</nav>

<button id="theme-toggle" title="Түнгі/күндізгі режим">🌙</button>

<main>
    <section>
        <h2 id="contacts-title"></h2>
        <p id="contacts-text"></p>
    </section>
</main>

<footer>
    <p id="footer-text"></p>
</footer>

<script src="script.js"></script>
<script>
const dataExtra = {
    kk: {
        "contacts-title": "Байланыс",
        "contacts-text": "Телефон: +7 123 456 7890<br>Мекен-жай: Алматы қ., Б. Майлин көшесі 12"
    },
    ru: {
        "contacts-title": "Контакты",
        "contacts-text": "Телефон: +7 123 456 7890<br>Адрес: г. Алматы, ул. Б. Майлина 12"
    },
    en: {
        "contacts-title": "Contacts",
        "contacts-text": "Phone: +7 123 456 7890<br>Address: Almaty, B. Mailin Street 12"
    }
};

function updateExtra() {
    const lang = document.getElementById("langSelect").value;
    const t = dataExtra[lang];
    for (let key in t) {
        const el = document.getElementById(key);
        if (el) el.innerHTML = t[key];
    }
}

document.getElementById("langSelect").addEventListener("change", updateExtra);
updateExtra();
</script>
</body>
</html>
